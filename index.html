<!DOCTYPE html>
<html>
<head>
	<title>new_001</title>
	<meta charset="utf-8">
	<!-- Compiled w/ P5LIVE, http://github.com/ffd8/p5live -->
	<style type="text/css">
		body{
			margin:0;
			overflow:hidden;
		}
		canvas{
			position:fixed;
			top:0;
			left:0;
			z-index:-1;
			width:100vw;
			height:100vh;
			margin:0;
		}
	</style>
	<script type="text/javascript">
		// eco-mode = only render if window focused
		window.onblur = function () {
			noLoop();
		};
		window.onfocus = function () {
			loop();
		};
	</script>
<script type="text/javascript" src="https://cdn.jsdelivr.net/npm/p5@1/lib/p5.min.js"></script>
<script type="text/javascript" src="https://cdn.jsdelivr.net/gh/processing/p5.js-sound/lib/p5.sound.min.js"></script>
</head>
<body style="background: rgb(0, 0, 0);">

<script type="text/javascript">
//new_001

/* CUSTOM FUNCTIONS FOR P5LIVE */
// keep fullscreen if window resized
function windowResized() {
	resizeCanvas(windowWidth, windowHeight);
}

// custom ease function
function ease(iVal, oVal, eVal){
	return oVal += (iVal - oVal) * eVal;
}

// processing compatibility
function println(msg){
	print(msg);
}


let recorder
let chunks = []
let recording = false

let canvas

let vid
let input

let tiles = []
let compSeed = 0

let countSlider
let scaleSlider
let stretchSlider
let button
let startRecButton
let stopRecButton

let gui
let guiHeader
let draggingGUI = false
let dragOffsetX = 0
let dragOffsetY = 0

function setup() {

	canvas = createCanvas(windowWidth, windowHeight)

	// ---------------- GUI PANEL ----------------

	gui = createDiv()
	gui.position(20, 20)

	gui.style("background", "rgba(15,15,15,0.75)")
	gui.style("padding", "16px")
	gui.style("border-radius", "16px")
	gui.style("border", "1px solid rgba(255,255,255,0.2)")
	gui.style("color", "white")
	gui.style("font-family", "sans-serif")
	gui.style("width", "220px")
	gui.style("user-select", "none")

	guiHeader = createDiv("GLITCH CONTROL")
	guiHeader.parent(gui)
	guiHeader.style("font-weight", "bold")
	guiHeader.style("margin-bottom", "10px")
	guiHeader.style("cursor", "move")

	guiHeader.mousePressed(startDraggingGUI)

	// ---------------- SLIDERS ----------------

	createDiv("Rectangles").parent(gui)

	countSlider = createSlider(5, 200, 20)
	countSlider.parent(gui)
	countSlider.input(generateTiles)

	createDiv("Scale").parent(gui)

	scaleSlider = createSlider(0.5, 2, 0.5, 0.1)
	scaleSlider.parent(gui)

	createDiv("Stretch").parent(gui)

	stretchSlider = createSlider(0.2, 3, 1.5, 0.1)
	stretchSlider.parent(gui)

	// ---------------- FILE INPUT ----------------

	createDiv("Upload Video").parent(gui)

	input = createFileInput(handleFile)
	input.parent(gui)

	// ---------------- BUTTONS ----------------

	button = createButton("New Composition")
	button.parent(gui)

	button.mousePressed(() => {
		compSeed = random(100000)
		tiles = []
		generateTiles()
	})

	startRecButton = createButton("Start Recording")
	startRecButton.parent(gui)
	startRecButton.mousePressed(startRecording)

	stopRecButton = createButton("Stop Recording")
	stopRecButton.parent(gui)
	stopRecButton.mousePressed(stopRecording)

	background(0)
}

function draw() {

	clear()
	
	//createCanvas(1920, 1080)

	// GUI drag
	if(draggingGUI) {
		gui.position(
			mouseX - dragOffsetX,
			mouseY - dragOffsetY
		)
	}

	if(vid) {

		image(vid, 0, 0, width, height)

		let scale = scaleSlider.value()
		let stretch = stretchSlider.value()

		for(let t of tiles) {

			let dw = t.sw * scale * stretch
			let dh = t.sh * scale

			let centerX = t.dx + t.sw / 2
			let centerY = t.dy + t.sh / 2

			let newDx = centerX - dw / 2
			let newDy = centerY - dh / 2

			copy(
				vid,
				t.sx, t.sy, t.sw, t.sh,
				newDx, newDy, dw, dh
			)
		}
	}
}

// ---------------- GUI DRAG ----------------

function startDraggingGUI() {

	draggingGUI = true

	let pos = gui.position()

	dragOffsetX = mouseX - pos.x
	dragOffsetY = mouseY - pos.y
}

function mouseReleased() {
	draggingGUI = false
}

// ---------------- VIDEO ----------------

function handleFile(file) {

	if(file.type === "video") {

		if(vid) vid.remove()

		vid = createVideo([file.data])

		vid.hide()
		vid.volume(0)
		vid.loop()

		vid.elt.onloadedmetadata = () => {

			compSeed = random(100000)
			tiles = []

			generateTiles()
		}
	}
}

// ---------------- RECORDING ----------------

function startRecording() {

	if (!canvas || !canvas.elt.captureStream) return

	chunks = []

	let stream = canvas.elt.captureStream(60)

	let options = {}

	if (MediaRecorder.isTypeSupported("video/webm; codecs=vp9")) {
		options.mimeType = "video/webm; codecs=vp9"
	} else if (MediaRecorder.isTypeSupported("video/webm; codecs=vp8")) {
		options.mimeType = "video/webm; codecs=vp8"
	}

	// ALWAYS create recorder (this was your bug)
	recorder = new MediaRecorder(stream, options)

	// HQ upgrade
	recorder.videoBitsPerSecond = 30000000

	recorder.ondataavailable = e => {
		if (e.data.size > 0) chunks.push(e.data)
	}

	recorder.onstop = saveVideo

	recorder.start()

	recording = true

	startRecButton.html("RECORDING...")
}

function stopRecording() {

	if(recorder && recording) {
		recorder.stop()
		recording = false

		startRecButton.html("Start Recording")
	}


}

function saveVideo() {

	let blob = new Blob(chunks, { type: "video/webm" })
	let url = URL.createObjectURL(blob)

	let a = document.createElement("a")
	a.href = url
	a.download = "glitch-export.webm"
	a.click()

	URL.revokeObjectURL(url)
}

// ---------------- TILE SYSTEM ----------------

function generateTiles() {

	if(!vid) return

	let targetCount = countSlider.value()

	for(let i = tiles.length; i < targetCount; i++) {
		tiles.push(makeTile(i))
	}

	if(tiles.length > targetCount) {
		tiles.length = targetCount
	}
}

function randomWithSeed(seed, min, max) {

	let x = Math.sin(seed) * 10000
	x = x - Math.floor(x)

	return min + x * (max - min)
}

function makeTile(i) {

	let seed = compSeed + i * 9999

	let sw = randomWithSeed(seed, 80, 300)
	let sh = randomWithSeed(seed + 1, 80, 300)

	let sx = randomWithSeed(seed + 2, 0, vid.width - sw)
	let sy = randomWithSeed(seed + 3, 0, vid.height - sh)

	let dx = randomWithSeed(seed + 4, 0, width)
	let dy = randomWithSeed(seed + 5, 0, height)

	return { sx, sy, sw, sh, dx, dy }
}
</script>

</body>
</html>
